<html:div class="setting-part" xmlns:html="http://www.w3.org/1999/xhtml" >
<table xmlns="http://www.w3.org/1999/xhtml" class="zn-settings1">
  <tr>
    <td><label for="legacy-display">Legacy display</label></td>
    <td>
      <input class="zenotes-values" id="legacy-display" data-key="legacy-display" type="checkbox" />
    </td>
  </tr>
  <tr>
    <td><label for="hide-main-legend">Hide note/annotation icons</label></td>
    <td>
      <input class="zenotes-values" id="hide-main-legend" data-key="hide-main-legend" type="checkbox" />
    </td>
  </tr>
  <tr>
    <td><label for="main-comment-label">Main comment label</label></td>
    <td>
      <input class="zenotes-values" id="main-comment-label" data-key="main-comment-label" type="text" placeholder="Main comment" />
    </td>
  </tr>
  <tr>
    <td><label for="untagged-column-label">Untagged column label</label></td>
    <td>
      <input class="zenotes-values" id="untagged-column-label" data-key="untagged-column-label" type="text" placeholder="Untagged" />
    </td>
  </tr>
  
  <tr>
    <td>Highlight opacity</td>
    <td>
      <input onchange="Zotero.AppBase.Engine.Components.emitter.emit('opacityChanged', this.value);" class="zenotes-values" data-key="quote-bg-opacity" type="range" min="0" max="255" step="1" />
    </td>
  </tr>
  <tr>
    <td><label for="always-show-column-sorter" title="Shows column sorter when no column is hidden. Check when you have many tags.">Show column sorter</label></td>
    <td>
      <input class="zenotes-values" id="always-show-column-sorter" data-key="always-show-column-sorter"  type="checkbox" />
    </td>
  </tr>
  <tr>
    <td><label for="column-prefix">Column prefix</label></td>
    <td>
      <input class="zenotes-values" id="column-prefix" data-key="column-prefix" type="text" placeholder="Column prefix" />
    </td>
  </tr>
  <tr>
    <td><label for="column-suffix">Column suffix</label></td>
    <td>
      <input class="zenotes-values" id="column-suffix" data-key="column-suffix" type="text" placeholder="Column suffix" />
    </td>
  </tr>
  <tr>
    <td><label for="allow-duplicate-rows" title="Allow duplicate rows">Allow duplicate rows</label></td>
    <td>
      <input class="zenotes-values" id="allow-duplicate-rows" data-key="allow-duplicate-rows" type="checkbox" />
    </td>
  </tr>
</table>
</html:div>
